name: Database Migrations

on:
  push:
    branches: [main]
    paths:
      - 'db/schema.js'
      - 'db/migrations/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Migration action'
        required: true
        default: 'push'
        type: choice
        options:
          - push
          - generate
          - dry-run

jobs:
  migrate:
    name: Run Migrations
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate migrations (if requested)
        if: github.event.inputs.action == 'generate'
        run: npx drizzle-kit generate
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}

      - name: Dry run migrations
        if: github.event.inputs.action == 'dry-run'
        run: npx drizzle-kit push --dry-run
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}

      - name: Push migrations to Supabase
        if: github.event.inputs.action == 'push' || github.event.inputs.action == ''
        run: npx drizzle-kit push
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}

      - name: Commit generated migrations
        if: github.event.inputs.action == 'generate'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add db/migrations/
          git diff --staged --quiet || git commit -m "chore: auto-generate database migration"
          git push
